<!DOCTYPE html>
<html lang="es">
<head>
    <title>Three.js - Mixamo Controller</title>
    <link rel="icon" type="image/png" href="./assets/img/arquera.jpg">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="./assets/css/main.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">
        <span class="navbar-brand">
            <span style="color: white">Mixamo</span> | Studio
        </span>
    </div>
</nav>

<div id="canvas-container">
    <div class="controls-hint">
        <h6>Keyboard Commands</h6>
        
        <div class="control-row">
            <kbd>1</kbd> <span>Hip Hop Dance</span>
        </div>
        <div class="control-row">
            <kbd>2</kbd> <span>Joyful Jump</span>
        </div>
        <div class="control-row">
            <kbd>3</kbd> <span>Strafing Walk</span>
        </div>
        <div class="control-row">
            <kbd>4</kbd> <span>Sprint Run</span>
        </div>
        <div class="control-row">
            <kbd>5</kbd> <span>Entry Move</span>
        </div>
    </div>
</div>

<footer class="text-center">
    <div class="container text-secondary">
        <p class="mb-1">Desarrollado con <strong>Three.js</strong> & <strong>Mixamo FBX</strong></p>
        <small>Lead Developer: <strong>Ochoa Jolette</strong> | Graficacion 2026</small>
    </div>
</footer>

<script type="importmap">
    {
        "imports": {
            "three": "./assets/Build/three.module.js",
            "three/addons/controls/": "./assets/jsm/controls/",
            "three/addons/libs/": "./assets/libs/",
            "three/addons/loaders/": "./assets/loaders/"
        }
    }
</script>

<script type="module" src="./assets/js/main.js"></script>
</body>
</html>
